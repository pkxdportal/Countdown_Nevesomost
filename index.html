<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>До Невесомости</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>
  <div class="noise"></div>
  <div class="particles"></div>

  <main class="scene">
    <section class="hero">
      <div class="signs-orbit">
      <img src="volt.png" class="sign sign-volt" alt="teamvolts">
      <img src="flame.png" class="sign sign-flame" alt="teamflame">
      <img src="leaf.png" class="sign sign-leaf" alt="teamleaf">
      </div>

      <h1>
        До начала
        <span>Невесомости</span>
      </h1>

      <div id="timer" class="timer">
        <div class="time-card">
          <span id="days">00</span>
          <p>дней</p>
        </div>
        <div class="time-card">
          <span id="hours">00</span>
          <p>часов</p>
        </div>
        <div class="time-card">
          <span id="minutes">00</span>
          <p>минут</p>
        </div>
        <div class="time-card">
          <span id="seconds">00</span>
          <p>секунд</p>
        </div>
      </div>

      <div class="hashtags">
        <span>#teamvolts</span>
        <span>#teamflame</span>
        <span>#teamleaf</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
