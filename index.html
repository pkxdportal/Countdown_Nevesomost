<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>До Невесомости</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="stars"></div>

  <main class="container">
    <div class="card">
      <div class="badge">PK XD PORTAL EVENT</div>

      <h1>🚀 До начала<br><span>Невесомости</span></h1>
      <p class="subtitle">Готовься к новому космическому событию</p>

      <div id="timer">
        <div class="time-box">
          <span id="days">00</span>
          <label>Дней</label>
        </div>
        <div class="time-box">
          <span id="hours">00</span>
          <label>Часов</label>
        </div>
        <div class="time-box">
          <span id="minutes">00</span>
          <label>Минут</label>
        </div>
        <div class="time-box">
          <span id="seconds">00</span>
          <label>Секунд</label>
        </div>
      </div>

      <div class="hashtags">
        <span>#teamvolts</span>
        <span>#teamflame</span>
        <span>#teamleaf</span>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
