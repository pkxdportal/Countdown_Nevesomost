<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>До Невесомости</title>

  <link rel="stylesheet" href="style.css?v=7" />
</head>

<body>
  <div class="background"></div>
  <div class="team-glow" id="teamGlow"></div>
  <div class="noise"></div>
  <div class="particles"></div>

  <div class="language-wrapper">
  <button type="button" id="langToggle" class="lang-toggle">
    🌐
  </button>

  <div id="languageMenu" class="language-menu">
    <button class="lang-btn active" data-lang="en">🇺🇸 EN</button>
    <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
    <button class="lang-btn" data-lang="pt">🇧🇷 PT</button>
    <button class="lang-btn" data-lang="tr">🇹🇷 TR</button>
    <button class="lang-btn" data-lang="id">🇮🇩 ID</button>
    <button class="lang-btn" data-lang="es">🇲🇽 ES</button>
    <button class="lang-btn" data-lang="hi">🇮🇳 HI</button>
  </div>
  </div>

  <main class="scene">
    <section class="hero">

      <div class="event-date" data-i18n="eventDate">
        11 ИЮНЯ 2026 • 16:00 МСК
      </div>

      <div class="signs-orbit">
        <div class="orbit-line orbit-blue"></div>
        <div class="orbit-line orbit-red"></div>
        <div class="orbit-line orbit-green"></div>

        <img src="volt.png" class="sign sign-volt" alt="Team Volts" loading="eager" />
        <img src="flame.png" class="sign sign-flame" alt="Team Flame" loading="eager" />
        <img src="leaf.png" class="sign sign-leaf" alt="Team Leaf" loading="eager" />
      </div>

      <h1>
        <span class="title-small" data-i18n="titleTop">
          До начала
        </span>

        <span class="title-main" data-i18n="titleMain">
          Невесомости
        </span>
      </h1>

      <div id="timer" class="timer">
        <div class="time-card">
          <span id="days">00</span>
          <p data-i18n="days">дней</p>
        </div>

        <div class="time-card">
          <span id="hours">00</span>
          <p data-i18n="hours">часов</p>
        </div>

        <div class="time-card">
          <span id="minutes">00</span>
          <p data-i18n="minutes">минут</p>
        </div>

        <div class="time-card">
          <span id="seconds">00</span>
          <p data-i18n="seconds">секунд</p>
        </div>
      </div>

      <div class="hashtags">
        <button type="button" class="team-btn volts" data-team="volts">
          ⚡ #teamvolts
        </button>

        <button type="button" class="team-btn flame" data-team="flame">
          🔥 #teamflame
        </button>

        <button type="button" class="team-btn leaf" data-team="leaf">
          🍃 #teamleaf
        </button>
      </div>

      <div class="portal-credit">
        <span data-i18n="credit">
          Сайт создан командой <b>PK XD PORTAL</b>
        </span>

        <a
          href="https://t.me/pkxdportal"
          target="_blank"
          rel="noopener noreferrer"
          data-i18n="channelBtn"
        >
          Перейти в канал
        </a>
      </div>

      <div class="music-player">
        <button type="button" id="musicToggle" class="music-btn" data-i18n="musicOn">
          🔊 Музыка Невесомости
        </button>
      </div>

      <audio id="bgMusic" loop>
        <source src="nevesomost.mp3" type="audio/mpeg" />
      </audio>

    </section>
  </main>

  <div id="teamPopup" class="team-popup" aria-hidden="true">
    <button type="button" id="closePopup" class="close-popup">×</button>

    <div id="popupIcon" class="popup-icon"></div>

    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
  </div>

  <script src="script.js?v=7"></script>
</body>
</html>
